<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Ninja shuriken pixel art in hot pink -->
  <g fill="#FF69B4" stroke="#FF69B4" stroke-width="0.5">
    <!-- Center -->
    <rect x="52" y="52" width="16" height="16" rx="2"/>
    <!-- Top blade -->
    <rect x="56" y="20" width="8" height="32"/>
    <rect x="48" y="24" width="8" height="8"/>
    <rect x="64" y="28" width="8" height="8"/>
    <rect x="40" y="28" width="8" height="4"/>
    <rect x="72" y="32" width="8" height="4"/>
    <!-- Bottom blade -->
    <rect x="56" y="68" width="8" height="32"/>
    <rect x="64" y="84" width="8" height="8"/>
    <rect x="48" y="80" width="8" height="8"/>
    <rect x="72" y="88" width="8" height="4"/>
    <rect x="40" y="84" width="8" height="4"/>
    <!-- Left blade -->
    <rect x="20" y="56" width="32" height="8"/>
    <rect x="24" y="64" width="8" height="8"/>
    <rect x="28" y="48" width="8" height="8"/>
    <rect x="28" y="72" width="4" height="8"/>
    <rect x="32" y="40" width="4" height="8"/>
    <!-- Right blade -->
    <rect x="68" y="56" width="32" height="8"/>
    <rect x="84" y="48" width="8" height="8"/>
    <rect x="80" y="64" width="8" height="8"/>
    <rect x="88" y="40" width="4" height="8"/>
    <rect x="84" y="72" width="4" height="8"/>
    <!-- Center detail -->
    <circle cx="60" cy="60" r="4" fill="#003D22"/>
  </g>
  <!-- Outline glow -->
  <circle cx="60" cy="60" r="56" stroke="#FF69B4" stroke-width="2.5" fill="none" opacity="0.4"/>
</svg>
